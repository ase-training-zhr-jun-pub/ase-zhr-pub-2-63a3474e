# Test-Konfiguration: eigene Datenbank `calvin_test`, getrennt von den Dev-Daten.
# Schema wird je Testlauf neu erzeugt und am Ende verworfen (saubere Ausgangslage).
#
# Hinweis: In dieser Trainingsumgebung kann Docker keine Container starten, daher laufen die
# Integrationstests gegen ein lokal installiertes PostgreSQL (nicht Testcontainers). In CI-/Dev-
# Umgebungen mit funktionierendem Docker wäre Testcontainers (@ServiceConnection) der übliche Weg.
spring.datasource.url=${SPRING_TEST_DATASOURCE_URL:jdbc:postgresql://localhost:5432/calvin_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:calvin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:calvin}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
