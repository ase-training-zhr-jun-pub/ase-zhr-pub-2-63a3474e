spring.application.name=booking-service

# Port 8080 ist in der Trainingsumgebung vom code-server belegt -> 8081 nutzen.
server.port=8081

# --- Persistenz: PostgreSQL (siehe docker-compose.yml) ---
# Konfigurierbar per Umgebungsvariable, damit der Container-/CI-Betrieb sie überschreiben kann.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/calvin}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:calvin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:calvin}

# Schema im Prototyp automatisch aus den Entities ableiten. Für den Produktivbetrieb
# auf `validate` umstellen und Migrationen (z. B. Flyway) einführen.
spring.jpa.hibernate.ddl-auto=update
# Kein Open-Session-in-View: Transaktionsgrenzen bleiben in der Application-Schicht.
spring.jpa.open-in-view=false
